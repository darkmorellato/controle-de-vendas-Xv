    <style>
        /* Vision Pro Style Background - BLUE THEME */
        body {
            background-color: #f2f2f2;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(245, 158, 11, 0.08) 0%, transparent 40%),
                /* Laranja sutil */
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                /* Azul sutil */
                linear-gradient(to bottom, #f8f8f8, #eeeeee);
            background-attachment: fixed;
            color: #1e293b;
        }

        /* Glassmorphism Refinado */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 10px 15px -3px rgba(0, 0, 0, 0.02),
                0 20px 25px -5px rgba(0, 0, 0, 0.02),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .glass-dark {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Inputs Modernos */
        input,
        select {
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
        }

        input:focus,
        select:focus {
            transform: translateY(-2px) scale(1.01);
            background-color: #ffffff;
            box-shadow:
                0 20px 25px -5px rgba(0, 0, 0, 0.05),
                0 8px 10px -6px rgba(0, 0, 0, 0.01),
                0 0 0 4px rgba(59, 130, 246, 0.1) !important;
            /* Blue glow */
            border-color: rgba(59, 130, 246, 0.3) !important;
            /* Blue border */
        }

        /* Botões "Pílula" e Hover Effects */
        button {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .active-scale:active {
            transform: scale(0.92);
        }

        /* Scrollbar Invisível/Sutil */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .receipt-paper {
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        @media print {
            @page {
                margin: 5mm;
                size: auto;
            }

            .no-print {
                display: none !important;
            }

            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                font-size: 10px !important;
            }

            body:not(.receipt-open) .max-w-5xl {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            body:not(.receipt-open) .bg-white {
                box-shadow: none !important;
                border: 1px solid #eee !important;
                border-radius: 0 !important;
            }

            body:not(.receipt-open) .overflow-x-auto {
                overflow: visible !important;
            }

            body:not(.receipt-open) table {
                width: 100% !important;
                table-layout: fixed !important;
                border-collapse: collapse !important;
            }

            body:not(.receipt-open) tr {
                page-break-inside: avoid !important;
            }

            body:not(.receipt-open) td,
            body:not(.receipt-open) th {
                padding: 4px !important;
                word-wrap: break-word !important;
                white-space: normal !important;
                vertical-align: top !important;
            }

            .print-col-cliente {
                width: 20% !important;
            }

            .print-col-itens {
                width: 35% !important;
            }

            .print-col-vendedor {
                width: 10% !important;
            }

            .print-col-pagamento {
                width: 20% !important;
            }

            .print-col-total {
                width: 15% !important;
            }

            body.receipt-open #root>div>div:not(.receipt-modal-wrapper) {
                display: none !important;
            }

            .receipt-modal-wrapper {
                position: fixed !important;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: white !important;
                padding: 0 !important;
                display: flex !important;
                align-items: flex-start !important;
                justify-content: center !important;
                z-index: 9999 !important;
            }

            .receipt-modal-content {
                box-shadow: none !important;
                width: 100% !important;
                max-width: 80mm !important;
                position: static !important;
                margin: 0 auto !important;
            }

            .receipt-paper {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                padding: 0 !important;
                border-radius: 0 !important;
            }

            .receipt-paper::after,
            .receipt-actions-bar {
                display: none !important;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>

        const validateCPF = (cpf) => {
            cpf = cpf.replace(/[^\d]+/g, '');
            if (cpf.length !== 11 || !!cpf.match(/(\d)\1{10}/)) return false;
            let sum = 0, remainder;
            for (let i = 1; i <= 9; i++) sum = sum + parseInt(cpf.substring(i - 1, i)) * (11 - i);
            remainder = (sum * 10) % 11;
            if ((remainder === 10) || (remainder === 11)) remainder = 0;
            if (remainder !== parseInt(cpf.substring(9, 10))) return false;
            sum = 0;
            for (let i = 1; i <= 10; i++) sum = sum + parseInt(cpf.substring(i - 1, i)) * (12 - i);
            remainder = (sum * 10) % 11;
            if ((remainder === 10) || (remainder === 11)) remainder = 0;
            if (remainder !== parseInt(cpf.substring(10, 11))) return false;
            return true;
        };

        const maskCEP = (value) => value.replace(/\D/g, '').replace(/^(\d{5})(\d)/, '$1-$2').slice(0, 9);
        const maskIMEI = (value) => value.replace(/\D/g, '').slice(0, 15);

        const ToastContainer = ({ toasts, removeToast }) => (<div className="fixed top-8 right-8 z-[200] flex flex-col gap-4 pointer-events-none">{toasts.map(toast => (<div key={toast.id} className={`pointer-events-auto flex items-center gap-5 px-8 py-6 rounded-[2rem] shadow-2xl border border-white/10 transform transition-all duration-500 animate-slide-in-right glass-dark ${toast.type === 'error' ? 'border-red-500/50' : toast.type === 'success' ? 'border-orange-500/50' : 'border-orange-500/50'}`}><div className={`p-3 rounded-full ${toast.type === 'error' ? 'bg-red-500/20 text-red-400' : toast.type === 'success' ? 'bg-orange-500/20 text-orange-400' : 'bg-orange-500/20 text-orange-400'}`}>{toast.type === 'error' ? <Icons.AlertCircle className="w-6 h-6" /> : toast.type === 'success' ? <Icons.Check className="w-6 h-6" /> : <Icons.AlertCircle className="w-6 h-6" />}</div><p className="font-bold text-white text-sm tracking-wide">{toast.message}</p><button onClick={() => removeToast(toast.id)} className="text-slate-400 hover:text-white transition-colors p-2 hover:bg-white/10 rounded-xl"><Icons.X className="w-5 h-5" /></button></div>))}</div>);

        const App = () => {

            const [alertModalOpen, setAlertModalOpen] = useState(false);
            const [alertData, setAlertData] = useState({ message: '', phase: '' });
            const [lastAlertTime, setLastAlertTime] = useState(0);

            const [isHelpDropdownOpen, setIsHelpDropdownOpen] = useState(false);

            // --- FIREBASE SYNC & AUTH ---
            useEffect(() => {
                const tryLogin = async () => {
                    try {

                });
                return () => unsubscribeAuth();
            }, []);

            // Salvar configurações locais
            useEffect(() => {
                const st = localStorage.getItem('vendas_settings_v14');
                if (st) {

                }
            }, []);
            useEffect(() => localStorage.setItem('vendas_settings_v14', JSON.stringify(settings)), [settings]);

            // Sincronização em tempo real das Tarefas do Dia com Firestore
            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const unsub = db.collection('rotina_diaria').doc(today).onSnapshot(doc => {
                    if (doc.exists) {
                        setRoutineState(doc.data().state || {});
                    } else {
                        setRoutineState({});
                    }
                }, err => console.error("Erro rotina:", err));
                return () => unsub();
            }, []);

            const toggleRoutine = (category, index) => {
                const key = `${category}-${index}`;
                const today = new Date().toISOString().split('T')[0];
                const newState = { ...routineState, [key]: !routineState[key] };
                setRoutineState(newState);
                db.collection('rotina_diaria').doc(today).set({ state: newState, date: today }, { merge: true })
                    .catch(err => console.error("Erro ao salvar rotina:", err));
            };

            const playAlertSound = () => { try { new Audio('speech_1771176567518.mp3').play().catch(e => console.error(e)); } catch (e) { console.error(e); } };

            useEffect(() => {
                if (!isLoggedIn) return;
                const checkAlerts = () => {
                    const now = new Date();
                    const currentMinutes = now.getHours() * 60 + now.getMinutes();
                    if (Date.now() - lastAlertTime < 15 * 60 * 1000) return;

                    let shouldTrigger = false, phaseName = "";
                    const phases = [
                        { name: "Início - Manhã", start: 570, end: 780, key: "morning" },
                        { name: "Meio - Tarde", start: 810, end: 990, key: "afternoon" },
                        { name: "Fim - Fechamento", start: 1020, end: 1110, key: "evening" }
                    ];

                    for (const p of phases) {
                        if (currentMinutes >= p.start && currentMinutes <= p.end) {
                            if (!ROUTINE_TASKS[p.key].every((_, i) => routineState[`${p.key}-${i}`])) {
                                shouldTrigger = true; phaseName = p.name; break;
                            }
                        }
                    }

                    if (shouldTrigger) {
                        setAlertData({ phase: phaseName, message: `(${settings.employeeName}) Não esqueça de completar suas tarefas diárias\n${phaseName}\nExiste Pendências!` });
                        setAlertModalOpen(true);
                        setLastAlertTime(Date.now());
                        playAlertSound();
                    }
                };
                const interval = setInterval(checkAlerts, 60000);
                checkAlerts();
                return () => clearInterval(interval);
            }, [isLoggedIn, routineState, lastAlertTime]);

            useEffect(() => {
                const handleBeforeUnload = (e) => { if (items.length > 0) { e.preventDefault(); e.returnValue = ''; } };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [items]);

            const totalAmount = useMemo(() => items.reduce((acc, item) => acc + (item.unitPrice * (item.quantity || 1)), 0), [items]);
            const totalDiscount = useMemo(() => items.reduce((acc, item) => acc + (item.discount || 0), 0), [items]);
            const finalTotal = totalAmount - totalDiscount;
            const totalPaid = useMemo(() => paymentList.reduce((acc, p) => acc + p.amount, 0), [paymentList]);
            const changeAmount = totalPaid - finalTotal;
            const remainingToPay = Math.max(0, Math.round(((finalTotal - totalPaid) + Number.EPSILON) * 100) / 100);

            const getPaymentStyles = (type) => {
                switch (type) {
                    case 'Entrada': return { wrapper: 'bg-orange-50 border-orange-200 text-orange-800', amount: 'text-orange-700' };
                    case 'Parte do Pagamento': return { wrapper: 'bg-slate-100 border-slate-200 text-slate-800', amount: 'text-slate-600' };
                    case 'Restante': return { wrapper: 'bg-indigo-50 border-indigo-200 text-indigo-800', amount: 'text-indigo-700' };
                    default: return { wrapper: 'bg-sky-50 border-sky-200 text-sky-800', amount: 'text-sky-700' };
                }
            };

            useEffect(() => {
                if (receiptModalOpen) document.body.classList.add('receipt-open');
                else document.body.classList.remove('receipt-open');
            }, [receiptModalOpen]);

            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            const fillClientData = (f) => {
                setClientName(f.name); setClientCpf(f.cpf || ''); setClientPhone(f.phone || ''); setClientEmail(f.email || ''); setClientDob(f.dob || ''); setClientAddress(f.address || ''); setClientNumber(f.number || ''); setClientNeighborhood(f.neighborhood || ''); setClientCity(f.city || ''); setClientZip(f.zip || ''); setClientState(f.state || '');
            };

            const handleZipChange = async (e) => {
                const value = maskCEP(e.target.value); setClientZip(value);
                if (value.replace(/\D/g, '').length === 8) {
                    try {
                        showToast("Buscando endereço...", "info");
                        const res = await fetch(`https://viacep.com.br/ws/${value.replace(/\D/g, '')}/json/`);
                        const data = await res.json();
                        if (!data.erro) { setClientAddress(data.logradouro); setClientCity(data.localidade); setClientState(data.uf); setClientNeighborhood(data.bairro); showToast("Endereço encontrado!"); }
                    } catch (err) { console.error(err); }
                }
            };

            const handleCpfChange = (e) => {
                const val = maskCPF(e.target.value); setClientCpf(val);
                if (val.replace(/\D/g, '').length === 11) {
                    const f = clients.find(c => c.cpf && c.cpf.replace(/\D/g, '') === val.replace(/\D/g, ''));
                    if (f) { showToast("Cliente encontrado!", "info"); fillClientData(f); }
                }
            };

            const handleSaveClient = () => {
                if (!clientName) { showToast("Nome é obrigatório", "error"); return; }
                if (clientCpf && !validateCPF(clientCpf)) { showToast("CPF Inválido", "error"); return; }

                const existingClient = clients.find(c => (c.cpf && clientCpf && c.cpf === clientCpf) || (c.name.trim().toLowerCase() === clientName.trim().toLowerCase()));
                const clientId = existingClient ? existingClient.id : (db.collection('clientes').doc().id);

                const clientData = {
                    id: clientId,
                    name: clientName, cpf: clientCpf, phone: clientPhone, email: clientEmail, dob: clientDob,
                    address: clientAddress, number: clientNumber, neighborhood: clientNeighborhood,
                    city: clientCity, zip: clientZip, state: clientState,
                    createdBy: existingClient ? existingClient.createdBy : settings.employeeName,
                    createdAt: existingClient ? existingClient.createdAt : new Date().toISOString()
                };

                db.collection('clientes').doc(clientId).set(clientData)
                    .then(() => showToast("Dados salvos na carteira (Nuvem)!"))
                    .catch(err => showToast("Erro ao salvar: " + err.message, "error"));
            };

            const handleOpenClientData = (client) => {
                setSelectedClientForEdit({ ...client });
                setClientDataModalOpen(true);
            };

            const handleClientDataChange = (field, value) => {
                setSelectedClientForEdit(prev => ({ ...prev, [field]: value }));
            };

            const confirmClientUpdate = () => {
                setPendingAuthAction('update_client');
                setManagerAuthModalOpen(true);
            };

            const performClientUpdate = async () => {
                const clientRef = db.collection('clientes').doc(selectedClientForEdit.id);
                const batch = db.batch();
                batch.update(clientRef, selectedClientForEdit);

                const salesToUpdate = sales.filter(s => {
                    const originalClient = clients.find(c => c.id === selectedClientForEdit.id);
                    return (originalClient?.cpf && s.clientCpf === originalClient.cpf) || (s.clientName.trim().toLowerCase() === originalClient?.name.trim().toLowerCase());
                });

                salesToUpdate.forEach(sale => {
                    const saleRef = db.collection('vendas').doc(sale.id);
                    batch.update(saleRef, {
                        clientName: selectedClientForEdit.name,
                        clientCpf: selectedClientForEdit.cpf,
                        clientPhone: selectedClientForEdit.phone,
                        clientEmail: selectedClientForEdit.email,
                        clientDob: selectedClientForEdit.dob,
                        clientAddress: selectedClientForEdit.address,
                        clientNumber: selectedClientForEdit.number,
                        clientNeighborhood: selectedClientForEdit.neighborhood,
                        clientCity: selectedClientForEdit.city,
                        clientState: selectedClientForEdit.state,
                        clientZip: selectedClientForEdit.zip
                    });
                });

                try {
                    await batch.commit();
                    showToast("Dados atualizados com sucesso!");
                    setConfirmClientUpdateModalOpen(false);
                    setClientDataModalOpen(false);
                } catch (error) {
                    showToast("Erro ao atualizar: " + error.message, "error");
                }
            };

            const handleAddItem = () => {
                if (!newItemType) { showToast("Selecione o Tipo do item", "error"); return; }
                if (!newItemDesc || !newItemPrice) { showToast("Preencha Descrição e Preço", "error"); return; }

                let finalPrice = parseCurrency(newItemPrice);
                let finalDiscount = parseCurrency(newItemDiscount);

                if (category === 'Devolução') { finalPrice = -Math.abs(finalPrice); finalDiscount = -Math.abs(finalDiscount); }
                else if (category === 'Troca') {
                    if (exchangeAction === 'in') { finalPrice = -Math.abs(finalPrice); finalDiscount = -Math.abs(finalDiscount); }
                    else { finalPrice = Math.abs(finalPrice); finalDiscount = Math.abs(finalDiscount); }
                }

                setItems([...items, { id: Date.now(), sequence: items.length + 1, quantity: newItemQty, type: newItemType || 'PRODUTO', description: newItemDesc, ram_storage: newItemRam, color: newItemColor, imei: newItemImei, financed: newItemFinanced, unitPrice: finalPrice, discount: finalDiscount }]);
                setNewItemQty(1); setNewItemType(''); setNewItemDesc(''); setNewItemRam(''); setNewItemColor(''); setNewItemImei(''); setNewItemFinanced('Não'); setNewItemPrice(''); setNewItemDiscount(''); setNewItemDiscountPercent('');
            };

            const handleAddPayment = () => {
                if (!currentPaymentMethod || !currentPaymentAmount) { showToast("Preencha Forma e Valor", "error"); return; }
                let amountToAdd = parseCurrency(currentPaymentAmount);
                if (["Devolução Dinheiro", "Devolução Pix", "Devolução Estorno Cartão"].includes(currentPaymentMethod)) { amountToAdd = -Math.abs(amountToAdd); }
                setPaymentList([...paymentList, { id: Date.now(), method: currentPaymentMethod, type: currentPaymentType || 'Integral', amount: amountToAdd, installments: currentPaymentMethod === 'Credito Parcelado' ? currentInstallments : null }]);
                setCurrentPaymentMethod(''); setCurrentPaymentType(''); setCurrentPaymentAmount(''); setCurrentInstallments('');
            };

            const handleRemovePayment = (id) => setPaymentList(paymentList.filter(p => p.id !== id));
            const handleRemoveItem = (id) => setItems(items.filter(i => i.id !== id));
            const resetForm = () => { setClientName(''); setClientCpf(''); setClientPhone(''); setClientEmail(''); setClientDob(''); setClientAddress(''); setClientNumber(''); setClientCity(''); setClientZip(''); setClientState(''); setClientNeighborhood(''); setItems([]); setEditingId(null); setIsDateLocked(true); setPaymentList([]); setCurrentPaymentMethod(''); setCurrentPaymentType(''); setCurrentPaymentAmount(''); setCurrentInstallments(''); };
            const openReceipt = (sale) => { setCurrentReceipt(sale); setReceiptModalOpen(true); };

                if (clientName) handleSaveClient();
                const safeTotal = Math.round((finalTotal + Number.EPSILON) * 100) / 100;
                const safeDiscount = Math.round((totalDiscount + Number.EPSILON) * 100) / 100;

                const saleId = editingId || db.collection('vendas').doc().id;

                const saleData = {
                    id: saleId,
                    date,
                    timestamp: new Date().toISOString(),
                    clientName, clientCpf, clientPhone, clientEmail, clientDob, clientAddress, clientNumber, clientCity, clientZip, clientState, clientNeighborhood, category, items, amount: safeTotal, discount: safeDiscount, employeeName: settings.employeeName, store: "Miplace XV", payments: paymentList, amountPaid: totalPaid, change: changeAmount
                };

                db.collection('vendas').doc(saleId).set(saleData)
                    .then(() => {
                        showToast(editingId ? "Atualizado na nuvem!" : "Venda registrada na nuvem!");
                        if (!editingId) openReceipt(saleData);
                        resetForm();
                    })
                    .catch(err => showToast("Erro ao salvar: " + err.message, "error"));
            };

            const performDelete = () => {
                if (editingId) {
                    db.collection('vendas').doc(editingId).delete()
                        .then(() => { showToast("Excluído da nuvem!", "error"); resetForm(); })
                        .catch(err => showToast("Erro ao excluir: " + err.message, "error"));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (items.length === 0) { showToast("Adicione itens!", "error"); return; }
                const isRefundOrExchangeCredit = finalTotal < 0;
                if (!isRefundOrExchangeCredit && totalPaid < finalTotal - 0.02) {
                    setPendingAuthAction('save');
                    setManagerAuthModalOpen(true);
                    return;
                }
                setConfirmSaleModalOpen(true);
            };

            const handleManagerAuth = async () => {
                if (managerPassword === MANAGER_PASSWORD) {
                    if (pendingAuthAction === 'save') performSave();
                    if (pendingAuthAction === 'reset') performFactoryReset();
                    if (pendingAuthAction === 'edit' && pendingEditItem) startEdit(pendingEditItem);
                    if (pendingAuthAction === 'delete') performDelete();
                    if (pendingAuthAction === 'update_client') performClientUpdate();

                    setManagerAuthModalOpen(false);
                    setManagerPassword('');
                    setPendingAuthAction(null);
                    setPendingEditItem(null);
                } else {
                    showToast("Senha incorreta", "error");
                }

            const handleItemPriceChange = (e) => {
                const val = e.target.value.replace(/\D/g, ''); const floatVal = parseFloat(val) / 100 || 0;
                setNewItemPrice(new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2 }).format(floatVal));
                if (newItemDiscountPercent) {
                    const pct = parseFloat(newItemDiscountPercent.replace(',', '.')) || 0;
                    setNewItemDiscount(new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2 }).format((floatVal * newItemQty) * (pct / 100)));
                }
            };

            const handlePercentChange = (e) => {
                const val = e.target.value.replace(',', '.'); setNewItemDiscountPercent(val);
                if (newItemPrice) {
                    const price = parseCurrency(newItemPrice);
                    const pct = parseFloat(val) || 0;
                    setNewItemDiscount(new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2 }).format((price * newItemQty) * (pct / 100)));
                }
            };

            const handleDiscountValChange = (e) => {
                const val = e.target.value.replace(/\D/g, ''); const floatVal = parseFloat(val) / 100 || 0;
                setNewItemDiscount(new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2 }).format(floatVal));
                if (newItemPrice) {
                    const price = parseCurrency(newItemPrice) * newItemQty;
                    if (price > 0) setNewItemDiscountPercent(((floatVal / price) * 100).toFixed(2).replace('.', ','));
                }
            };

            const handleCurrentPaymentAmountChange = (e) => { const val = e.target.value.replace(/\D/g, ''); const floatVal = parseFloat(val) / 100 || 0; setCurrentPaymentAmount(new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2 }).format(floatVal)); };

            const handleExportBackup = async () => {
                const data = { sales, clients, settings };
                const fileName = `backup_miplace_${new Date().toISOString().split('T')[0]}.json`;
                const jsonString = JSON.stringify(data);
                try {
                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({ suggestedName: fileName, types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }] });
                        const writable = await handle.createWritable();
                        await writable.write(jsonString); await writable.close(); showToast("Arquivo salvo com sucesso!");
                        if (logoutModalOpen) setLogoutModalOpen(false); return;
                    }
                } catch (err) { if (err.name === 'AbortError') return; }
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
                showToast("Backup salvo na pasta padrão!"); if (logoutModalOpen) setLogoutModalOpen(false);
            };

            const handleSaveToCloud = async () => {
                if (!auth.currentUser) {
                    showToast("Erro: Não conectado à nuvem.", "error");
                    return;
                }
                showToast("Verificando sincronização com a nuvem...", "info");
                try {
                    await db.collection('system_logs').add({
                        action: 'manual_cloud_save',
                        user: settings.employeeName,
                        timestamp: new Date().toISOString()
                    });
                    setTimeout(() => showToast("Sucesso! Todos os dados estão salvos na nuvem."), 1000);
                } catch (e) {
                    showToast("Erro ao conectar com a nuvem.", "error");
                }
            };

            const handleImportBackup = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const readFile = (file) => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => { try { resolve(JSON.parse(event.target.result)); } catch (err) { reject(err); } };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });

                try {
                    const loadedDataList = await Promise.all(files.map(file => readFile(file)));
                    const batch = db.batch();
                    let count = 0;

                    loadedDataList.forEach(data => {
                        if (data.sales && Array.isArray(data.sales)) {
                            data.sales.forEach(s => {
                                const ref = db.collection('vendas').doc(s.id);
                                batch.set(ref, s);
                                count++;
                            });
                        }
                        if (data.clients && Array.isArray(data.clients)) {
                            data.clients.forEach(c => {
                                const ref = db.collection('clientes').doc(c.id);
                                batch.set(ref, c);
                                count++;
                            });
                        }
                    });

                    if (count > 0) {
                        await batch.commit();
                        showToast(`${count} registros importados para a nuvem!`);
                    } else {
                        showToast("Nenhum dado válido encontrado.");
                    }
                    setIsBackupOpen(false);

                // Estilos forçados para o PDF
                clone.style.boxShadow = 'none';
                clone.style.borderRadius = '0';
                clone.style.margin = '0';
                clone.style.padding = '0';
                clone.style.maxWidth = '100%';
                clone.style.width = '80mm'; // Largura fixa 80mm
                clone.style.backgroundColor = '#ffffff';
                clone.style.color = '#000000';
                clone.style.height = 'auto'; // Altura automática

                // Container temporário para cálculo de altura
                const container = document.createElement('div');
                container.style.position = 'fixed';
                container.style.top = '-9999px';
                container.style.left = '0';
                container.style.zIndex = '-1';
                container.appendChild(clone);
                document.body.appendChild(container);

                // Adicionamos um pequeno buffer para garantir que nada corte
                const heightPx = clone.offsetHeight || clone.scrollHeight;
                const heightMm = Math.ceil(heightPx * 0.264583) + 2;

                    margin: 0,
                    filename: `recibo_${currentReceipt?.clientName || 'venda'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        scrollY: 0,
                        windowWidth: document.documentElement.offsetWidth
                    },
                    // Define o formato com a altura calculada exata do conteúdo
                    jsPDF: { unit: 'mm', format: [80, heightMm], orientation: 'portrait' }
                };

                html2pdf().set(opt).from(clone).save().then(() => {
                    document.body.removeChild(container);
                    showToast("PDF Exportado com Sucesso!");
                }).catch(err => {

            }, [paginatedSales, groupBy]);

                    <div className="glass sticky top-4 z-50 no-print transition-all duration-300 mx-4 md:mx-auto max-w-6xl rounded-[2.5rem] mt-4 shadow-vision mb-8 border border-white/60">

                            <div className="flex items-center gap-5"><div className="bg-gradient-to-br from-orange-500 to-orange-600 p-3 rounded-2xl shadow-lg shadow-orange-500/30 text-white"><Icons.Store className="w-6 h-6" /></div><div><h1 className="font-bold text-xl leading-none text-slate-800 font-display mb-1">Miplace</h1><span className="font-bold text-[10px] text-slate-400 uppercase tracking-[0.2em]">{settings.employeeName}</span></div><div className="h-10 w-px bg-slate-200/50 mx-2"></div><a href="https://miplace.odoo.com/odoo/action-1581" target="_blank" className="p-3 bg-slate-50/50 hover:bg-white border border-transparent hover:border-slate-200 rounded-2xl text-slate-500 hover:text-odoo-600 transition-all shadow-sm active-scale" title="Lista de Preço"><Icons.Tag className="w-5 h-5" /></a></div>

                                <button onClick={() => setCurrentView(currentView === 'performance' ? 'dashboard' : 'performance')} className={`p-3 rounded-[1.5rem] transition-all duration-500 ${currentView === 'performance' ? 'bg-white text-orange-600 shadow-md ring-1 ring-black/5' : 'text-slate-400 hover:bg-white/60 hover:text-slate-600'}`} title="Desempenho"><Icons.BarChart className="w-5 h-5" /></button>

                                                                <div className="p-2.5 bg-white border border-slate-100 rounded-xl group-hover:border-odoo-200 group-hover:text-odoo-600 text-slate-400 transition-colors shadow-sm">

                                        <div className="border-t-2 border-dashed border-slate-200 py-6 space-y-5 relative z-10">{(currentReceipt.items || []).sort((a, b) => { if (currentReceipt.category === 'Troca') return a.unitPrice - b.unitPrice; return 0; }).map((it, idx) => (<div key={idx} className="relative"><div className="flex justify-between items-start font-bold text-sm"><div className="flex gap-2"><span className="text-slate-400 font-mono">{it.quantity}x</span><span className="uppercase leading-tight">{it.description}</span></div><span className="font-mono whitespace-nowrap ml-2">{formatCurrency((it.unitPrice * it.quantity) - it.discount)}</span></div><div className="text-[10px] text-slate-400 pl-6 uppercase tracking-tight font-medium mt-1">{it.type} • {it.ram_storage} • {it.color}</div>{it.discount > 0 && <div className="text-[10px] text-red-500 pl-6 font-bold bg-red-50 inline-block rounded px-2 py-0.5 ml-6 mt-1">Desc: -{formatCurrency(it.discount)}</div>}</div>))}</div>
                                        <div className="border-t-2 border-slate-800 pt-6 mt-4 mb-8 relative z-10"><div className="flex justify-between items-end mb-2"><span className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Total a Pagar</span><span className="text-3xl font-black tracking-tighter">R$ {formatCurrency(currentReceipt.amount)}</span></div></div>
                                        <div className="space-y-2 text-[11px] mb-10 relative z-10 bg-slate-50/80 p-4 rounded-xl border border-slate-100">{(currentReceipt.payments || []).map((p, idx) => (<div key={idx} className="flex justify-between uppercase border-b border-slate-200 pb-1.5 last:border-0 last:pb-0"><span className="font-bold text-slate-500">{p.method} <span className="text-[9px] opacity-60 ml-1">{p.installments}</span></span><span className="font-mono font-bold">{formatCurrency(p.amount)}</span></div>))}{currentReceipt.change > 0 && (<div className="flex justify-between uppercase pt-3 mt-1.5 border-t-2 border-slate-200"><span className="font-black text-slate-400">Troco</span><span className="font-mono font-bold text-slate-700">{formatCurrency(currentReceipt.change)}</span></div>)}</div>
                                        <div className="text-center space-y-6 relative z-10"><div className="bg-slate-800 text-white rounded-2xl p-5 shadow-lg"><p className="text-[9px] font-bold uppercase mb-2 opacity-60 tracking-widest">WhatsApp / Suporte</p><p className="text-xl font-black tracking-wider font-mono">(19) 99497-5131</p></div><div className="text-[9px] uppercase text-slate-400 tracking-widest pt-3 font-bold"><p className="mb-2">Vendedor: {currentReceipt.employeeName}</p><p>Obrigado pela preferência!</p></div><div className="w-24 h-1 bg-slate-200 mx-auto rounded-full"></div></div>
                                    </div>
                                    <div className="h-4 bg-slate-100" style={{ background: 'linear-gradient(45deg, transparent 33.333%, #ffffff 33.333%, #ffffff 66.667%, transparent 66.667%), linear-gradient(-45deg, transparent 33.333%, #ffffff 33.333%, #ffffff 66.667%, transparent 66.667%)', backgroundSize: '12px 24px', backgroundPosition: '0 -12px', transform: 'rotate(180deg)' }}></div>
                                </div>
                            </div>
                        </div>
                    )}
                    {isBackupOpen && (
                        <div className="fixed inset-0 z-[170] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-lg no-print animate-in fade-in duration-500">
                            <div className="bg-white rounded-[3rem] p-10 max-w-md w-full shadow-2xl animate-in zoom-in-95 duration-500 text-slate-700 relative overflow-hidden border border-white/20">
                                <div className="flex justify-between items-center mb-10 relative z-10"><h3 className="font-bold text-2xl text-slate-800 font-display">Backup do Sistema</h3><button onClick={() => setIsBackupOpen(false)} className="p-3 hover:bg-slate-100 rounded-2xl transition-colors"><Icons.X className="w-6 h-6 text-slate-400" /></button></div>
                                <div className="space-y-6 relative z-10">
                                    <div className="p-6 bg-orange-50/60 rounded-[2rem] border border-orange-100 hover:shadow-lg transition-all group duration-300 hover:-translate-y-1">
                                        <div className="flex items-center gap-4 mb-4"><div className="p-3 bg-orange-100 text-orange-600 rounded-2xl group-hover:scale-110 transition-transform"><Icons.Download className="w-6 h-6" /></div><h4 className="font-bold text-lg text-orange-900">Salvar Backup</h4></div>
                                        <p className="text-xs text-orange-600/80 mb-6 pl-14 leading-relaxed">Gere um arquivo de segurança (.json) contendo todos os dados de vendas e clientes.</p>
                                        <div className="flex gap-3"><button onClick={handleExportBackup} className="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold hover:bg-orange-700 transition-all active-scale shadow-lg shadow-orange-500/20 text-sm uppercase tracking-wide">Baixar Arquivo</button><button onClick={handleSaveToCloud} className="flex-1 py-4 bg-sky-500 text-white rounded-2xl font-bold hover:bg-sky-600 transition-all active-scale shadow-lg shadow-sky-500/20 text-sm uppercase tracking-wide flex items-center justify-center gap-2"><Icons.CloudUpload className="w-5 h-5" /> Nuvem</button></div>
                                    </div>
                                    <div className="p-6 bg-orange-50/60 rounded-[2rem] border border-orange-100 hover:shadow-lg transition-all group duration-300 hover:-translate-y-1"><div className="flex items-center gap-4 mb-4"><div className="p-3 bg-orange-100 text-orange-600 rounded-2xl group-hover:scale-110 transition-transform"><Icons.Upload className="w-6 h-6" /></div><h4 className="font-bold text-lg text-orange-900">Importar Backup</h4></div><p className="text-xs text-orange-800/80 mb-6 pl-14 leading-relaxed">Restaure dados de um arquivo salvo anteriormente. Isso unificará com os dados atuais (Na nuvem).</p><input type="file" accept=".json" multiple onChange={handleImportBackup} ref={fileInputInternalRef} className="hidden" /><button onClick={() => fileInputInternalRef.current.click()} className="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold hover:bg-orange-600 transition-all active-scale shadow-lg shadow-orange-500/20 text-sm uppercase tracking-wide">Selecionar Arquivos</button></div>
                                    <div className="p-6 bg-red-50/60 rounded-[2rem] border border-red-100 mt-10 hover:shadow-lg transition-all group"><div className="flex items-center gap-4 mb-3"><div className="p-2.5 bg-red-100 text-red-600 rounded-xl group-hover:rotate-12 transition-transform"><Icons.AlertTriangle className="w-5 h-5" /></div><h4 className="font-bold text-red-900 text-sm">Zona de Perigo</h4></div><p className="text-[10px] text-red-700 mb-4 pl-14 font-medium">Resetar o sistema LOCAL (cache) para o estado inicial.</p><button onClick={triggerFactoryReset} className="w-full py-3 bg-white border border-red-200 text-red-600 rounded-2xl font-bold hover:bg-red-50 transition-all active-scale text-xs uppercase tracking-wide">Limpar Cache Local</button></div>
                                </div>
                                <div className="mt-12 pt-8 border-t border-slate-100 text-center text-[10px] text-slate-300 uppercase font-black tracking-[0.3em]">Miplace 2026 • v3.0</div>
                            </div>
                        </div>
                    )}
                    {logoutModalOpen && (
                        <div className="fixed inset-0 z-[180] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-lg no-print animate-in fade-in duration-500">
                            <div className="bg-white rounded-[3rem] p-10 text-center max-w-sm w-full animate-in zoom-in-95 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-red-500"></div><div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner"><Icons.LogOut className="w-10 h-10 text-red-500" /></div><h3 className="font-bold text-2xl mb-4 text-slate-800 font-display">Sair do Sistema?</h3><p className="text-sm text-slate-500 mb-10 leading-relaxed font-medium">Recomendamos <b>salvar um backup</b> antes de trocar de vendedor para evitar perda de dados.</p>
                                <div className="space-y-4">
                                    <div className="flex gap-3"><button onClick={handleExportBackup} className="flex-1 p-4 bg-orange-600 text-white rounded-2xl font-bold hover:bg-orange-700 shadow-lg shadow-orange-500/30 transition-all active-scale uppercase tracking-wide text-[10px]">Baixar & Sair</button><button onClick={() => { handleSaveToCloud(); setTimeout(() => setLogoutModalOpen(false), 1500); }} className="flex-1 p-4 bg-sky-500 text-white rounded-2xl font-bold hover:bg-sky-600 shadow-lg shadow-sky-500/30 transition-all active-scale uppercase tracking-wide text-[10px] flex items-center justify-center gap-1"><Icons.CloudUpload className="w-4 h-4" /> Salvar Nuvem</button></div>
                                    <div className="flex gap-3"><button onClick={() => setLogoutModalOpen(false)} className="flex-1 p-4 bg-slate-50 text-slate-600 rounded-2xl font-bold hover:bg-slate-100 transition-colors active-scale text-xs uppercase tracking-wide">Cancelar</button><button onClick={() => { setIsLoggedIn(false); setLogoutModalOpen(false); }} className="flex-1 p-4 bg-white border border-red-100 text-red-500 rounded-2xl font-bold hover:bg-red-50 transition-colors active-scale text-xs uppercase tracking-wide">Sair sem Salvar</button></div>
                                </div>
                            </div>
                        </div>
                    )}
                    {confirmSaleModalOpen && (
                        <div className="fixed inset-0 z-[190] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-lg no-print animate-in fade-in duration-500">
                            <div className="bg-white rounded-[3rem] p-10 text-center max-w-sm w-full animate-in zoom-in-95 shadow-2xl border-4 border-orange-50 relative overflow-hidden">
                                <div className="w-28 h-28 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-8 animate-pulse-slow shadow-inner"><Icons.Check className="w-14 h-14 text-orange-600" /></div><h3 className="font-bold text-3xl mb-4 text-slate-800 font-display">Confirmar Venda</h3><p className="text-sm text-slate-500 mb-10 px-4 font-medium">Você confirma o recebimento do pagamento e o lançamento dos itens?</p>
                                <div className="flex gap-4"><button onClick={() => setConfirmSaleModalOpen(false)} className="flex-1 p-5 bg-slate-50 rounded-2xl font-bold text-slate-600 hover:bg-slate-100 transition-colors active-scale">Voltar</button><button onClick={() => { setConfirmSaleModalOpen(false); performSave(); }} className="flex-1 p-5 bg-orange-600 text-white rounded-2xl font-bold hover:bg-orange-700 shadow-lg shadow-orange-500/30 transition-all active-scale">Confirmar!</button></div>
                            </div>
                        </div>
                    )}
                    {dateLockModalOpen && (
                        <div className="fixed inset-0 z-[160] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-lg no-print animate-in fade-in duration-500">
                            <div className="bg-white rounded-[3rem] p-12 text-center max-w-md w-full animate-in zoom-in-95 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-slate-800"></div><div className="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner"><Icons.Lock className="w-10 h-10 text-slate-600" /></div><h3 className="font-bold text-3xl mb-3 text-slate-800 font-display">Data Bloqueada</h3><p className="text-sm text-slate-500 mb-10 font-medium">Insira a senha gerencial para alterar a data.</p><input type="password" value={dateLockPassword} onChange={e => setDateLockPassword(e.target.value)} className="w-full p-5 border border-slate-200 rounded-[2rem] text-center mb-10 font-bold outline-none focus:ring-4 focus:ring-odoo-100 focus:border-odoo-500 transition-all text-xl placeholder:font-normal bg-slate-50 focus:bg-white" placeholder="Senha" autoFocus /><div className="flex gap-4"><button onClick={() => { setDateLockModalOpen(false); setDateLockPassword(''); }} className="flex-1 p-5 bg-slate-50 rounded-[2rem] font-bold text-slate-600 hover:bg-slate-100 transition-colors active-scale">Cancelar</button><button onClick={async () => { if (dateLockPassword === MANAGER_PASSWORD) { setIsDateLocked(false); setDateLockModalOpen(false); setDateLockPassword(''); showToast("Data liberada!"); } else showToast("Senha incorreta", "error"); }} className="flex-1 p-5 bg-slate-800 text-white rounded-[2rem] font-bold hover:bg-slate-900 shadow-lg shadow-slate-500/30 transition-all active-scale">Liberar</button></div>
                            </div>
                        </div>
                    )}
                    {clientSearchModalOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm no-print animate-in fade-in duration-300">
                            <div className="bg-white rounded-[3rem] w-full max-w-lg shadow-2xl animate-in zoom-in-95 overflow-hidden flex flex-col max-h-[85vh]">
                                <div className="p-8 border-b border-slate-100 flex justify-between font-bold items-center text-xl bg-slate-50/50 font-display"><h3>Selecionar Cliente</h3><button onClick={() => setClientSearchModalOpen(false)} className="p-3 hover:bg-slate-100 rounded-2xl transition-colors"><Icons.X className="w-6 h-6 text-slate-400" /></button></div>
                                <div className="p-8"><div className="relative group"><Icons.Search className="absolute left-6 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-400 group-hover:text-odoo-500 transition-colors" /><input type="text" placeholder="Digite Nome ou CPF..." value={clientSearchTerm} onChange={e => setClientSearchTerm(e.target.value)} className="w-full pl-16 pr-6 py-5 border border-slate-200 rounded-[2rem] outline-none focus:ring-4 focus:ring-odoo-100 focus:border-odoo-500 transition-all text-lg shadow-sm font-medium bg-slate-50/50 focus:bg-white" autoFocus /></div></div>
                                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                                    {filteredClients.map(c => (<div key={c.id} onClick={() => { fillClientData(c); setClientSearchModalOpen(false); }} className="p-6 mx-2 mb-4 border border-slate-100 rounded-[2rem] hover:bg-orange-50/50 hover:border-orange-200 cursor-pointer flex justify-between items-center transition-all group shadow-sm hover:shadow-md hover:-translate-y-1 duration-300 bg-white"><div><div className="font-bold text-slate-700 text-lg group-hover:text-orange-800">{c.name}</div><div className="text-sm text-slate-400 font-mono group-hover:text-orange-500 bg-slate-50 inline-block px-2 py-0.5 rounded-lg mt-1">{c.cpf}</div></div><div className="p-3.5 bg-slate-100 rounded-2xl group-hover:bg-white text-slate-400 group-hover:text-orange-500 transition-colors shadow-sm"><Icons.Plus className="w-6 h-6" /></div></div>))}
                                    {filteredClients.length === 0 && <div className="p-10 text-center text-slate-400 text-sm italic">Nenhum cliente encontrado.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                    {clientHistoryModalOpen && selectedClientHistory && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-lg no-print animate-in fade-in duration-500" onClick={() => setClientHistoryModalOpen(false)}>
                            <div className="bg-white rounded-[3rem] w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col animate-in zoom-in-95 duration-500 border border-white/20" onClick={e => e.stopPropagation()}>
                                <div className="p-10 border-b border-slate-100 bg-white/80 backdrop-blur-md flex justify-between items-center sticky top-0 z-10"><div><h3 className="font-bold text-2xl text-slate-800 flex items-center gap-4 font-display"><div className="p-3 bg-slate-100 rounded-2xl shadow-sm text-slate-600"><Icons.History className="w-6 h-6" /></div> Histórico de Compras</h3><p className="text-base text-slate-500 mt-2 ml-2 font-medium">{(selectedClientHistory.client.name || 'Cliente')} • <span className="font-mono text-sm">{selectedClientHistory.client.cpf}</span></p></div><button onClick={() => setClientHistoryModalOpen(false)} className="p-4 hover:bg-slate-100 rounded-2xl transition-colors"><Icons.X className="w-6 h-6 text-slate-400" /></button></div>
                                <div className="flex-1 overflow-y-auto p-10 bg-slate-50/30 custom-scrollbar">
                                    {selectedClientHistory.history.length === 0 ? (<div className="text-center py-24"><div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mx-auto mb-8 text-slate-300 shadow-inner border border-slate-100"><Icons.History className="w-16 h-16" /></div><p className="text-slate-400 font-bold text-xl">Nenhuma compra registrada.</p></div>) : (
                                        <div className="space-y-8">
                                            {selectedClientHistory.history.map(sale => (
                                                <div key={sale.id} className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8 flex flex-col md:flex-row gap-8 hover:shadow-xl transition-all hover:-translate-y-1 duration-500 group">
                                                    <div className="md:w-36 flex flex-col justify-center items-center bg-slate-50/50 rounded-[2rem] p-6 border border-slate-100 group-hover:bg-orange-50/50 group-hover:border-orange-100 transition-colors"><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 group-hover:text-orange-400">Data</span><span className="text-3xl font-black text-slate-800 group-hover:text-orange-700">{formatDateBR(sale.date).split('/')[0]}</span><span className="text-sm font-bold text-slate-500 uppercase">{new Date(sale.date).toLocaleString('default', { month: 'short' })}</span><span className="text-xs font-bold text-slate-300 mt-1">{formatDateBR(sale.date).split('/')[2]}</span></div>
                                                    <div className="flex-1"><span className="text-xs font-bold text-slate-400 uppercase mb-4 block tracking-widest pl-1">Produtos</span><div className="space-y-4">{(sale.items || []).map((item, idx) => (<div key={idx} className="flex justify-between items-center p-4 bg-slate-50/30 rounded-2xl border border-slate-100 hover:bg-white hover:shadow-sm transition-all"><div><span className="font-bold text-sm text-orange-600 bg-orange-50 px-2.5 py-1 rounded-lg mr-2 border border-orange-100">{item.quantity}x</span> <span className="text-base font-bold text-slate-700">{item.description}</span> <div className="text-xs text-slate-400 ml-1 mt-1 font-medium pl-10 uppercase tracking-wide">{item.ram_storage} • {item.color}</div></div><div className="text-right font-bold text-base text-slate-700 font-mono">{formatCurrency((item.unitPrice * item.quantity) - item.discount)}</div></div>))}</div></div>
                                                    <div className="md:w-64 flex flex-col justify-between border-l border-slate-100 pl-8 border-dashed"><div><span className="text-xs font-bold text-slate-400 uppercase mb-4 block tracking-widest">Pagamento</span><div className="space-y-3">{(sale.payments || []).map((p, idx) => (<div key={idx} className="flex justify-between text-xs font-bold text-slate-600 uppercase bg-slate-50 p-2 rounded-lg"><span>{p.method}</span><span className="font-mono">{formatCurrency(p.amount)}</span></div>))}</div></div><div className="mt-6 pt-6 border-t border-slate-100 flex justify-between items-center"><span className="text-xs font-black text-slate-400 uppercase tracking-wider">Total</span><span className="text-2xl font-black text-slate-800">{formatCurrency(sale.amountPaid || sale.amount)}</span></div><button onClick={() => openReceipt(sale)} className="w-full mt-5 py-4 bg-slate-800 text-white text-xs font-bold rounded-2xl hover:bg-slate-900 transition-all shadow-lg shadow-slate-500/20 active:scale-95 uppercase tracking-wide">Ver Recibo</button></div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                    {managerAuthModalOpen && (
                        <div className="fixed inset-0 z-[180] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-lg no-print animate-in fade-in duration-500" onClick={() => setManagerAuthModalOpen(false)}>
                            <div className="bg-white rounded-[3rem] p-12 text-center max-w-sm w-full animate-in zoom-in-95 shadow-2xl relative overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-0 left-0 w-full h-2 bg-red-500"></div><div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner"><Icons.Key className="w-10 h-10 text-red-500" /></div><h3 className="font-bold text-2xl mb-3 text-slate-800 font-display">Acesso Restrito</h3>
                                <p className="text-sm text-slate-500 mb-10 leading-relaxed font-medium">
                                    {pendingAuthAction === 'reset' ? 'Você está prestes a APAGAR todos os dados. Insira a senha.' :
                                        pendingAuthAction === 'edit' ? 'Autorização necessária para editar o lançamento.' :
                                            pendingAuthAction === 'delete' ? 'Tem certeza que deseja excluir? Esta ação é irreversível.' :
                                                pendingAuthAction === 'update_client' ? 'Confirme a senha gerencial para atualizar o cadastro.' :
                                                    'Divergência de valores. Insira a senha para forçar o lançamento.'}
                                </p>
                                <input type="password" value={managerPassword} onChange={e => setManagerPassword(e.target.value)} className="w-full p-5 border border-slate-200 rounded-[2rem] text-center mb-10 font-bold outline-none focus:ring-4 focus:ring-red-100 focus:border-red-500 transition-all text-xl placeholder:font-normal bg-slate-50 focus:bg-white" placeholder="Senha Gerencial" autoFocus />
                                <div className="flex gap-4"><button onClick={() => setManagerAuthModalOpen(false)} className="flex-1 p-5 bg-slate-50 rounded-[2rem] font-bold text-slate-600 hover:bg-slate-100 transition-colors active-scale">Cancelar</button><button onClick={handleManagerAuth} className="flex-1 p-5 bg-red-600 text-white rounded-[2rem] font-bold hover:bg-red-700 shadow-lg shadow-red-500/30 transition-all active-scale">Autorizar</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
